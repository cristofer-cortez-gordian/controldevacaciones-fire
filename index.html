    <script>

        // --- 1. SUPABASE CONFIG ---
        const SUPABASE_URL = 'https://tfazgymygyrsfscebpxo.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRmYXpneW15Z3lyc2ZzY2VicHhvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg3OTQyMTIsImV4cCI6MjA5NDM3MDIxMn0.dG4LohSUwuuJQo8BgqR_7eYa-v7XFr0npQ_N372f-5k';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        let employees = [];

        // --- 2. VACATION LAW LOGIC (LFT México - Vacaciones Dignas 2023) ---
        // Returns the number of days a worker gets for a specific year of service
        function getDaysForYear(yearOfService) {
            if (yearOfService < 1) return 0;
            if (yearOfService === 1) return 12;
            if (yearOfService === 2) return 14;
            if (yearOfService === 3) return 16;
            if (yearOfService === 4) return 18;
            if (yearOfService === 5) return 20;
            if (yearOfService >= 6 && yearOfService <= 10) return 22;
            if (yearOfService >= 11 && yearOfService <= 15) return 24;
            if (yearOfService >= 16 && yearOfService <= 20) return 26;
            if (yearOfService >= 21 && yearOfService <= 25) return 28;
            if (yearOfService >= 26 && yearOfService <= 30) return 30;
            if (yearOfService >= 31) return 32;
            return 12; // Fallback
        }

        // --- 3. HELPER FUNCTIONS ---
        // Calculates full completed years between start date and today
        function calculateCompletedYears(startDateStr) {
            const startDate = new Date(startDateStr);
            // Adding timezone offset to prevent day shifting issues
            startDate.setMinutes(startDate.getMinutes() + startDate.getTimezoneOffset());
            
            const today = new Date();
            let years = today.getFullYear() - startDate.getFullYear();
            
            // If the anniversary hasn't happened yet this year, subtract 1
            if (today.getMonth() < startDate.getMonth() || 
               (today.getMonth() === startDate.getMonth() && today.getDate() < startDate.getDate())) {
                years--;
            }
            return years < 0 ? 0 : years;
        }

        // Calculates the TOTAL amount of vacation days earned over their entire history
        function calculateTotalEarnedDays(yearsOfService) {
            let total = 0;
            for (let i = 1; i <= yearsOfService; i++) {
                total += getDaysForYear(i);
            }
            return total;
        }

        function formatDate(dateString) {
            const options = { year: 'numeric', month: 'long', day: 'numeric' };
            const date = new Date(dateString);
            date.setMinutes(date.getMinutes() + date.getTimezoneOffset());
            return date.toLocaleDateString('es-MX', options);
        }

        // --- 4. CORE APP LOGIC ---


        async function initApp() {
            // Display current date in header
            const todayOptions = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById('currentDateDisplay').textContent = new Date().toLocaleDateString('es-MX', todayOptions);

            // Cargar empleados desde Supabase
            try {
                const { data, error } = await supabase.from('empleados').select('*');
                if (!error && Array.isArray(data)) {
                    // Cargar historial de vacaciones para cada empleado
                    employees = await Promise.all(data.map(async emp => {
                        // Buscar historial en Supabase
                        const { data: history, error: histErr } = await supabase.from('historial_vacaciones').select('*').eq('empleado_id', emp.id).order('fecha_inicio', { ascending: false });
                        return {
                            id: emp.id,
                            name: emp.nombre,
                            nss: emp.nss,
                            curp: emp.curp,
                            rfc: emp.rfc,
                            startDate: emp.fecha_ingreso,
                            daysTaken: emp.dias_tomados || 0,
                            vacationHistory: !histErr && Array.isArray(history) ? history.map(v => ({
                                start: v.fecha_inicio,
                                end: v.fecha_fin,
                                days: v.dias,
                                timestamp: v.timestamp
                            })) : []
                        };
                    }));
                } else {
                    employees = [];
                }
            } catch (err) {
                employees = [];
            }
            renderEmployees();
            // Setup Form Listener
            document.getElementById('addEmployeeForm').addEventListener('submit', handleAddEmployee);
        }


        // No se usa localStorage, todo va a Supabase

        async function handleAddEmployee(e) {
            e.preventDefault();
            // Forzar mayúsculas en el nombre
            let name = document.getElementById('empName').value.trim().toUpperCase();
            document.getElementById('empName').value = name; // Reflejar en el input
            const nss = document.getElementById('empNSS').value.trim();
            const curp = document.getElementById('empCURP').value.trim().toUpperCase();
            const rfc = document.getElementById('empRFC').value.trim().toUpperCase();
            const date = document.getElementById('empDate').value;
            if (!name || !nss || !curp || !rfc || !date) {
                showToast("Por favor completa todos los campos.", "error");
                return;
            }
            try {
                const { data, error } = await supabase.from('empleados').insert([
                    {
                        nombre: name,
                        nss,
                        curp,
                        rfc,
                        fecha_ingreso: date,
                        dias_tomados: 0
                    }
                ]).select();
                if (error) {
                    showToast('Error al guardar en Supabase: ' + (error.message || error.details || 'Ver consola'), 'error');
                    return;
                } else if (data && data.length > 0) {
                    const newEmployee = {
                        id: data[0].id,
                        name: data[0].nombre,
                        nss: data[0].nss,
                        curp: data[0].curp,
                        rfc: data[0].rfc,
                        startDate: data[0].fecha_ingreso,
                        daysTaken: 0,
                        vacationHistory: []
                    };
                    employees.unshift(newEmployee);
                    document.getElementById('addEmployeeForm').reset();
                    renderEmployees();
                    showToast("Colaborador registrado exitosamente.", "success");
                }
            } catch (err) {
                showToast('Error de red con Supabase. Ver consola.', 'error');
            }
        }

        async function takeVacationDays(employeeId) {
            const inputElement = document.getElementById(`vacation-input-${employeeId}`);
            const startInput = document.getElementById(`vac-start-${employeeId}`);
            const endInput = document.getElementById(`vac-end-${employeeId}`);
            const daysToTake = parseInt(inputElement.value);
            const startDate = startInput.value;
            const endDate = endInput.value;
            if (isNaN(daysToTake) || daysToTake <= 0) {
                showToast("Ingresa un número válido de días.", "error");
                return;
            }
            if (!startDate || !endDate) {
                showToast("Por favor selecciona las fechas de inicio y fin.", "error");
                return;
            }
            if (new Date(startDate) > new Date(endDate)) {
                showToast("La fecha de inicio no puede ser mayor a la fecha de fin.", "error");
                return;
            }
            const empIndex = employees.findIndex(emp => emp.id === employeeId);
            if (empIndex === -1) return;
            const employee = employees[empIndex];
            const yearsOfService = calculateCompletedYears(employee.startDate);
            const totalEarned = calculateTotalEarnedDays(yearsOfService);
            const availableBalance = totalEarned - employee.daysTaken;
            if (daysToTake > availableBalance) {
                showToast(`Operación denegada. El colaborador solo tiene ${availableBalance} días disponibles.`, "error");
                return;
            }
            // Registrar en historial_vacaciones y actualizar dias_tomados en empleados
            const vacRecord = {
                empleado_id: employee.id,
                fecha_inicio: startDate,
                fecha_fin: endDate,
                dias: daysToTake,
                timestamp: new Date().toISOString()
            };
            try {
                // Insertar en historial_vacaciones
                await supabase.from('historial_vacaciones').insert([vacRecord]);
                // Actualizar dias_tomados en empleados
                const newDaysTaken = employee.daysTaken + daysToTake;
                await supabase.from('empleados').update({ dias_tomados: newDaysTaken }).eq('id', employeeId);
                // Actualizar local
                employees[empIndex].daysTaken = newDaysTaken;
                employees[empIndex].vacationHistory.unshift({
                    start: startDate,
                    end: endDate,
                    days: daysToTake,
                    timestamp: vacRecord.timestamp
                });
                renderEmployees();
                showToast(`Se registraron ${daysToTake} días de vacaciones tomados.`, "success");
            } catch (err) {
                showToast('Error al registrar vacaciones en Supabase.', 'error');
            }
        }

        function downloadReport() {
            if (employees.length === 0) {
                showToast("No hay datos para exportar.", "error");
                return;
            }

            // 1. Crear un nuevo libro de trabajo de Excel
            const wb = XLSX.utils.book_new();
            const data = [];

            // 2. Título principal
            data.push(["REPORTE DE VACACIONES - RECURSOS HUMANOS"]);
            data.push([`Generado el: ${new Date().toLocaleDateString('es-MX')}`]);
            data.push([]); // Fila vacía para separación

            // 3. Encabezados de tabla
            const headers = [
                "Nombre Completo", "NSS", "CURP", "RFC", "Fecha Ingreso", 
                "Antigüedad (Años)", "Vac. Ganadas", "Días Tomados", 
                "Saldo Disponible", "Historial de Fechas"
            ];
            data.push(headers);

            // 4. Llenar los datos
            employees.forEach(emp => {
                const years = calculateCompletedYears(emp.startDate);
                const total = calculateTotalEarnedDays(years);
                const balance = total - emp.daysTaken;
                
                let historyStr = "Sin historial";
                if (emp.vacationHistory && emp.vacationHistory.length > 0) {
                    historyStr = emp.vacationHistory.map(v => `Del ${formatDate(v.start)} al ${formatDate(v.end)} (${v.days}d)`).join(" | ");
                }

                data.push([
                    emp.name, 
                    emp.nss, 
                    emp.curp, 
                    emp.rfc, 
                    formatDate(emp.startDate),
                    years, 
                    total, 
                    emp.daysTaken, 
                    balance, 
                    historyStr
                ]);
            });

            // 5. Convertir el array a una hoja de cálculo
            const ws = XLSX.utils.aoa_to_sheet(data);

            // 6. Aplicar Estilos al Excel
            // Estilo Título
            ws["A1"].s = { 
                font: { sz: 14, bold: true, color: { rgb: "FFFFFF" } }, 
                fill: { fgColor: { rgb: "1D4ED8" } }, // Azul de Tailwind
                alignment: { horizontal: "center", vertical: "center" } 
            };
            // Combinar celdas para el título (De A1 a J1)
            ws["!merges"] = [ { s: { r: 0, c: 0 }, e: { r: 0, c: 9 } } ];

            // Estilo de los encabezados (Fila 4 - índice 3)
            const headerStyle = { 
                font: { bold: true, color: { rgb: "1E293B" } }, 
                fill: { fgColor: { rgb: "DBEAFE" } }, // Azul claro
                border: { 
                    top: {style:'thin', color:{auto:1}}, 
                    bottom: {style:'thin', color:{auto:1}}, 
                    left: {style:'thin', color:{auto:1}}, 
                    right: {style:'thin', color:{auto:1}} 
                },
                alignment: { horizontal: "center" }
            };

            for(let C = 0; C < 10; ++C) {
                const cellRef = XLSX.utils.encode_cell({r: 3, c: C});
                if(!ws[cellRef]) continue;
                ws[cellRef].s = headerStyle;
            }

            // Estilos para las filas de datos (Bordes)
            const dataStyle = { 
                border: { 
                    top: {style:'thin', color:{rgb:"E2E8F0"}}, 
                    bottom: {style:'thin', color:{rgb:"E2E8F0"}}, 
                    left: {style:'thin', color:{rgb:"E2E8F0"}}, 
                    right: {style:'thin', color:{rgb:"E2E8F0"}} 
                },
                alignment: { vertical: "center" }
            };

            for(let R = 4; R < data.length; ++R) {
                for(let C = 0; C < 10; ++C) {
                    const cellRef = XLSX.utils.encode_cell({r: R, c: C});
                    if(!ws[cellRef]) ws[cellRef] = {t: 's', v: ''}; // Crear si está vacía
                    ws[cellRef].s = dataStyle;
                }
            }

            // Ancho de las columnas
            ws["!cols"] = [
                {wch: 35}, // Nombre
                {wch: 15}, // NSS
                {wch: 22}, // CURP
                {wch: 15}, // RFC
                {wch: 20}, // Fecha
                {wch: 18}, // Antigüedad
                {wch: 15}, // Ganadas
                {wch: 15}, // Tomados
                {wch: 16}, // Saldo
                {wch: 60}  // Historial (Ancho para leer bien)
            ];

            // 7. Generar el archivo final
            XLSX.utils.book_append_sheet(wb, ws, "Base Vacaciones");
            XLSX.writeFile(wb, `Reporte_Vacaciones_HR_${new Date().toISOString().split('T')[0]}.xlsx`);
            
            showToast("Reporte profesional descargado exitosamente.", "success");
        }

        async function deleteEmployee(employeeId) {
            try {
                await supabase.from('empleados').delete().eq('id', employeeId);
                employees = employees.filter(emp => emp.id !== employeeId);
                renderEmployees();
                showToast("Colaborador eliminado del sistema.", "success");
            } catch (err) {
                showToast('Error al eliminar en Supabase.', 'error');
            }
        }

        function autoCalculateDays(employeeId) {
            const startInput = document.getElementById(`vac-start-${employeeId}`);
            const endInput = document.getElementById(`vac-end-${employeeId}`);
            const daysInput = document.getElementById(`vacation-input-${employeeId}`);
            
            if (startInput.value && endInput.value) {
                const start = new Date(startInput.value);
                const end = new Date(endInput.value);
                
                // Ajustar zona horaria para evitar desfasamientos
                start.setMinutes(start.getMinutes() + start.getTimezoneOffset());
                end.setMinutes(end.getMinutes() + end.getTimezoneOffset());

                if (end >= start) {
                    let count = 0;
                    let curDate = new Date(start);
                    
                    // Iterar día por día desde el inicio hasta el fin
                    while (curDate <= end) {
                        const dayOfWeek = curDate.getDay();
                        // 0 es Domingo, 6 es Sábado. Solo contamos de Lunes(1) a Viernes(5)
                        if (dayOfWeek !== 0 && dayOfWeek !== 6) {
                            count++;
                        }
                        // Avanzar al siguiente día
                        curDate.setDate(curDate.getDate() + 1);
                    }
                    
                    daysInput.value = count;
                } else {
                    daysInput.value = ''; // Limpiar si la fecha de fin es menor a la de inicio
                }
            }
        }

        // --- 5. UI RENDERING ---

        function renderEmployees() {
            const container = document.getElementById('employeesList');
            const emptyState = document.getElementById('emptyState');
            const countBadge = document.getElementById('employeeCount');
            // Buscador por nombre (case-insensitive)
            const searchInput = document.getElementById('searchInput');
            let filtered = [];
            if (searchInput && searchInput.value.trim() !== '') {
                const search = searchInput.value.trim().toUpperCase();
                filtered = employees.filter(emp => emp.name.toUpperCase().includes(search));
            }
            countBadge.textContent = `${filtered.length} registrado${filtered.length !== 1 ? 's' : ''}`;
            if (filtered.length === 0) {
                container.innerHTML = '';
                emptyState.classList.remove('hidden');
                emptyState.classList.add('flex');
                return;
            }
            emptyState.classList.add('hidden');
            emptyState.classList.remove('flex');
            let html = '';
            filtered.forEach(emp => {
                // Dynamic calculations (happens every render, automatically handles anniversaries!)
                const yearsOfService = calculateCompletedYears(emp.startDate);
                const totalEarned = calculateTotalEarnedDays(yearsOfService);
                const availableBalance = totalEarned - emp.daysTaken;
                const daysCurrentTier = getDaysForYear(yearsOfService + 1); // Days they will get next anniversary
                let balanceColorClass = availableBalance > 0 ? 'text-green-600' : 'text-slate-500';
                html += `
                <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden flex flex-col transition-all hover:shadow-md">
                    <!-- Card Header -->
                    <div class="bg-slate-50 px-5 py-4 border-b border-slate-200 flex justify-between items-start">
                        <div>
                            <h3 class="font-bold text-lg text-slate-800">${emp.name}</h3>
                            <p class="text-xs text-slate-500 mt-1 flex flex-col gap-0.5">
                                <span><strong>RFC:</strong> ${emp.rfc}</span>
                                <span><strong>CURP:</strong> ${emp.curp}</span>
                                <span><strong>NSS:</strong> ${emp.nss}</span>
                            </p>
                        </div>
                        <button onclick="deleteEmployee('${emp.id}')" class="text-slate-400 hover:text-red-500 transition-colors" title="Eliminar colaborador">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                                <path fill-rule="evenodd" d="M9 2a1 1 0 00-.894.553L7.382 4H4a1 1 0 000 2v10a2 2 0 002 2h8a2 2 0 002-2V6a1 1 0 100-2h-3.382l-.724-1.447A1 1 0 0011 2H9zM7 8a1 1 0 012 0v6a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v6a1 1 0 102 0V8a1 1 0 00-1-1z" clip-rule="evenodd" />
                            </svg>
                        </button>
                    </div>
                    <!-- Card Body -->
                    <div class="p-5 flex-grow">
                        <div class="grid grid-cols-2 gap-4 mb-4">
                            <div class="bg-blue-50/50 p-3 rounded-lg border border-blue-100">
                                <span class="block text-xs text-slate-500 mb-1">Fecha de Ingreso</span>
                                <span class="font-medium text-sm text-slate-800">${formatDate(emp.startDate)}</span>
                            </div>
                            <div class="bg-blue-50/50 p-3 rounded-lg border border-blue-100">
                                <span class="block text-xs text-slate-500 mb-1">Antigüedad</span>
                                <span class="font-medium text-sm text-slate-800">${yearsOfService} año(s)</span>
                            </div>
                        </div>
                        <div class="mb-5">
                            <h4 class="text-xs uppercase tracking-wider font-semibold text-slate-400 mb-3">Balance de Vacaciones</h4>
                            <div class="flex justify-between items-center mb-2">
                                <span class="text-sm text-slate-600">Total Ganadas (Histórico)</span>
                                <span class="font-medium text-sm">${totalEarned} días</span>
                            </div>
                            <div class="flex justify-between items-center mb-2">
                                <span class="text-sm text-slate-600">Días Tomados</span>
                                <span class="font-medium text-sm text-red-500">-${emp.daysTaken} días</span>
                            </div>
                            <div class="flex justify-between items-center pt-2 border-t border-slate-100 mt-2">
                                <span class="text-sm font-bold text-slate-800">Saldo Disponible</span>
                                <span class="text-xl font-bold ${balanceColorClass}">${availableBalance} <span class="text-sm font-medium">días</span></span>
                            </div>
                        </div>
                        ${yearsOfService === 0 ? 
                            `<div class="text-xs text-orange-600 bg-orange-50 p-2 rounded-md mb-4 flex items-start gap-1">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
                                </svg>
                                Aún no cumple el año. En su 1er aniversario se le sumarán automáticamente 12 días.
                            </div>` : ''
                        }
                        <!-- Historial de Vacaciones -->
                        ${emp.vacationHistory && emp.vacationHistory.length > 0 ? `
                            <div class="mt-4 pt-4 border-t border-slate-100">
                                <h4 class="text-xs uppercase tracking-wider font-semibold text-slate-400 mb-2">Historial de Fechas</h4>
                                <ul class="text-[11px] text-slate-600 space-y-1 max-h-24 overflow-y-auto pr-1">
                                    ${emp.vacationHistory.map(v => `
                                        <li class="flex justify-between items-center bg-slate-50 p-1.5 rounded">
                                            <span>Del <strong>${formatDate(v.start)}</strong> al <strong>${formatDate(v.end)}</strong></span>
                                            <span class="font-medium text-red-500">-${v.days}d</span>
                                        </li>
                                    `).join('')}
                                </ul>
                            </div>
                        ` : ''}
                    </div>
                    <!-- Card Footer (Action) -->
                    <div class="bg-slate-50 p-4 border-t border-slate-200">
                        <label class="block text-xs font-medium text-slate-600 mb-2">Registrar Vacaciones Tomadas</label>
                        <div class="flex flex-col gap-2">
                            <div class="grid grid-cols-2 gap-2">
                                <div>
                                    <span class="block text-[10px] text-slate-500 mb-0.5">Fecha Inicio</span>
                                    <input type="date" id="vac-start-${emp.id}" onchange="autoCalculateDays('${emp.id}')" class="w-full px-2 py-1.5 text-xs border border-slate-300 rounded-md outline-none focus:ring-1 focus:ring-blue-500">
                                </div>
                                <div>
                                    <span class="block text-[10px] text-slate-500 mb-0.5">Fecha Fin</span>
                                    <input type="date" id="vac-end-${emp.id}" onchange="autoCalculateDays('${emp.id}')" class="w-full px-2 py-1.5 text-xs border border-slate-300 rounded-md outline-none focus:ring-1 focus:ring-blue-500">
                                </div>
                            </div>
                            <div class="flex gap-2">
                                <input type="number" id="vacation-input-${emp.id}" min="1" max="${availableBalance}" class="w-20 px-3 py-1.5 text-sm border border-slate-300 rounded-md focus:ring-1 focus:ring-blue-500 outline-none" placeholder="Días">
                                <button onclick="takeVacationDays('${emp.id}')" ${availableBalance === 0 ? 'disabled' : ''} class="flex-grow bg-slate-800 hover:bg-slate-900 disabled:bg-slate-300 disabled:cursor-not-allowed text-white text-sm font-medium py-1.5 px-3 rounded-md transition-colors">
                                    Descontar
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
                `;
            });
            container.innerHTML = html;
        }
        // Forzar mayúsculas en el input de nombre mientras se escribe
        document.addEventListener('DOMContentLoaded', function() {
            const nameInput = document.getElementById('empName');
            if (nameInput) {
                nameInput.addEventListener('input', function(e) {
                    e.target.value = e.target.value.toUpperCase();
                });
            }
        });

        // --- 6. TOAST NOTIFICATIONS ---
        let toastTimeout;
        function showToast(message, type = "success") {
            const toast = document.getElementById('toast');
            const toastMessage = document.getElementById('toastMessage');
            const iconContainer = document.getElementById('toastIconContainer');
            
            toastMessage.textContent = message;
            
            if (type === "success") {
                toast.className = "fixed bottom-5 right-5 transform transition-all duration-300 z-50 flex items-center p-4 mb-4 text-slate-500 bg-white rounded-lg shadow-xl border-l-4 border-green-500";
                iconContainer.className = "inline-flex items-center justify-center flex-shrink-0 w-8 h-8 text-green-500 bg-green-100 rounded-lg";
                iconContainer.innerHTML = `<svg class="w-5 h-5" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 20 20"><path d="M10 .5a9.5 9.5 0 1 0 9.5 9.5A9.51 9.51 0 0 0 10 .5Zm3.707 8.207-4 4a1 1 0 0 1-1.414 0l-2-2a1 1 0 0 1 1.414-1.414L9 10.586l3.293-3.293a1 1 0 0 1 1.414 1.414Z"/></svg>`;
            } else {
                toast.className = "fixed bottom-5 right-5 transform transition-all duration-300 z-50 flex items-center p-4 mb-4 text-slate-500 bg-white rounded-lg shadow-xl border-l-4 border-red-500";
                iconContainer.className = "inline-flex items-center justify-center flex-shrink-0 w-8 h-8 text-red-500 bg-red-100 rounded-lg";
                iconContainer.innerHTML = `<svg class="w-5 h-5" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 20 20"><path d="M10 .5a9.5 9.5 0 1 0 9.5 9.5A9.51 9.51 0 0 0 10 .5Zm3.5 11.6a1 1 0 0 1-1.4 1.4l-2.1-2.1-2.1 2.1a1 1 0 0 1-1.4-1.4L8.6 10 6.5 7.9a1 1 0 0 1 1.4-1.4l2.1 2.1 2.1-2.1a1 1 0 0 1 1.4 1.4L11.4 10l2.1 2.1Z"/></svg>`;
            }

            // Show
            toast.classList.remove('translate-y-20', 'opacity-0');
            
            // Hide after 3.5 seconds
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => {
                toast.classList.add('translate-y-20', 'opacity-0');
            }, 3500);
        }

        // Initialize App on load
        window.addEventListener('DOMContentLoaded', initApp);
    </script>
</body>
</html>
