<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor de Vacaciones | HR</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
        }
        /* Custom scrollbar for a cleaner look */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f5f9; 
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8; 
        }
    </style>
</head>
<body class="text-slate-800 antialiased min-h-screen flex flex-col">

    <!-- Top Navigation -->
    <header class="bg-blue-700 text-white shadow-md">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-blue-200" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" />
                </svg>
                <h1 class="text-xl font-semibold">Sistema de Vacaciones HR</h1>
            </div>
            <div class="text-sm text-blue-200 font-medium" id="currentDateDisplay"></div>
        </div>
    </header>

    <main class="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full flex flex-col lg:flex-row gap-8">
        
        <!-- Left Column: Form -->
        <div class="w-full lg:w-1/3">
            <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6 sticky top-8">
                <h2 class="text-lg font-semibold text-slate-800 mb-4 flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-blue-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z" />
                    </svg>
                    Registrar Colaborador
                </h2>
                <form id="addEmployeeForm" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-600 mb-1">Nombre Completo</label>
                        <input type="text" id="empName" required class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-colors" placeholder="Ej. Juan Pérez">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-600 mb-1">NSS (Número de Seguro Social)</label>
                        <input type="text" id="empNSS" required class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-colors" placeholder="11 dígitos">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-600 mb-1">CURP</label>
                        <input type="text" id="empCURP" required class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-colors uppercase" placeholder="18 caracteres">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-600 mb-1">RFC</label>
                        <input type="text" id="empRFC" required class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-colors uppercase" placeholder="13 caracteres">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-600 mb-1">Fecha de Inicio a Colaborar</label>
                        <input type="date" id="empDate" required class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-colors">
                    </div>
                    <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2.5 rounded-lg transition-colors shadow-sm flex justify-center items-center gap-2">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4" />
                        </svg>
                        Guardar Colaborador
                    </button>
                </form>
            </div>
        </div>

        <!-- Right Column: Employee List -->
        <div class="w-full lg:w-2/3">
            <div class="mb-6 flex justify-between items-center">
                <h2 class="text-xl font-semibold text-slate-800">Directorio de Colaboradores</h2>
                <span id="employeeCount" class="bg-blue-100 text-blue-800 text-xs font-semibold px-2.5 py-0.5 rounded-full">0 registrados</span>
            </div>
            
            <div id="employeesList" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <!-- Cards will be injected here via JavaScript -->
            </div>

            <!-- Empty State -->
            <div id="emptyState" class="hidden flex-col items-center justify-center py-16 text-center bg-white rounded-xl border border-dashed border-slate-300">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-16 w-16 text-slate-300 mb-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z" />
                </svg>
                <h3 class="text-lg font-medium text-slate-900 mb-1">No hay colaboradores registrados</h3>
                <p class="text-slate-500 text-sm">Agrega el primer colaborador utilizando el formulario.</p>
            </div>
        </div>
    </main>

    <!-- Custom Toast Notification -->
    <div id="toast" class="fixed bottom-5 right-5 transform translate-y-20 opacity-0 transition-all duration-300 z-50 flex items-center p-4 mb-4 text-slate-500 bg-white rounded-lg shadow-lg border-l-4" role="alert">
        <div class="inline-flex items-center justify-center flex-shrink-0 w-8 h-8 rounded-lg" id="toastIconContainer">
            <!-- Icon injected via JS -->
        </div>
        <div class="ms-3 text-sm font-normal mr-4" id="toastMessage">Mensaje aquí</div>
    </div>

    <script>
        // --- 1. CONFIGURATION & STATE ---
        const LOCAL_STORAGE_KEY = 'hr_vacation_data';
        let employees = [];

        // --- 2. VACATION LAW LOGIC (LFT México - Vacaciones Dignas 2023) ---
        // Returns the number of days a worker gets for a specific year of service
        function getDaysForYear(yearOfService) {
            if (yearOfService < 1) return 0;
            if (yearOfService === 1) return 12;
            if (yearOfService === 2) return 14;
            if (yearOfService === 3) return 16;
            if (yearOfService === 4) return 18;
            if (yearOfService === 5) return 20;
            if (yearOfService >= 6 && yearOfService <= 10) return 22;
            if (yearOfService >= 11 && yearOfService <= 15) return 24;
            if (yearOfService >= 16 && yearOfService <= 20) return 26;
            if (yearOfService >= 21 && yearOfService <= 25) return 28;
            if (yearOfService >= 26 && yearOfService <= 30) return 30;
            if (yearOfService >= 31) return 32;
            return 12; // Fallback
        }

        // --- 3. HELPER FUNCTIONS ---
        // Calculates full completed years between start date and today
        function calculateCompletedYears(startDateStr) {
            const startDate = new Date(startDateStr);
            // Adding timezone offset to prevent day shifting issues
            startDate.setMinutes(startDate.getMinutes() + startDate.getTimezoneOffset());
            
            const today = new Date();
            let years = today.getFullYear() - startDate.getFullYear();
            
            // If the anniversary hasn't happened yet this year, subtract 1
            if (today.getMonth() < startDate.getMonth() || 
               (today.getMonth() === startDate.getMonth() && today.getDate() < startDate.getDate())) {
                years--;
            }
            return years < 0 ? 0 : years;
        }

        // Calculates the TOTAL amount of vacation days earned over their entire history
        function calculateTotalEarnedDays(yearsOfService) {
            let total = 0;
            for (let i = 1; i <= yearsOfService; i++) {
                total += getDaysForYear(i);
            }
            return total;
        }

        function formatDate(dateString) {
            const options = { year: 'numeric', month: 'long', day: 'numeric' };
            const date = new Date(dateString);
            date.setMinutes(date.getMinutes() + date.getTimezoneOffset());
            return date.toLocaleDateString('es-MX', options);
        }

        // --- 4. CORE APP LOGIC ---

        function initApp() {
            // Display current date in header
            const todayOptions = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById('currentDateDisplay').textContent = new Date().toLocaleDateString('es-MX', todayOptions);

            // Load data
            const savedData = localStorage.getItem(LOCAL_STORAGE_KEY);
            if (savedData) {
                try {
                    employees = JSON.parse(savedData);
                } catch (e) {
                    employees = [];
                }
            }
            
            renderEmployees();

            // Setup Form Listener
            document.getElementById('addEmployeeForm').addEventListener('submit', handleAddEmployee);
        }

        function saveToStorage() {
            localStorage.setItem(LOCAL_STORAGE_KEY, JSON.stringify(employees));
        }

        function handleAddEmployee(e) {
            e.preventDefault();
            
            const name = document.getElementById('empName').value.trim();
            const nss = document.getElementById('empNSS').value.trim();
            const curp = document.getElementById('empCURP').value.trim().toUpperCase();
            const rfc = document.getElementById('empRFC').value.trim().toUpperCase();
            const date = document.getElementById('empDate').value;

            if (!name || !nss || !curp || !rfc || !date) {
                showToast("Por favor completa todos los campos.", "error");
                return;
            }

            const newEmployee = {
                id: crypto.randomUUID(),
                name,
                nss,
                curp,
                rfc,
                startDate: date,
                daysTaken: 0 // Initialize taken days as 0
            };

            employees.unshift(newEmployee); // Add to beginning of array
            saveToStorage();
            
            document.getElementById('addEmployeeForm').reset();
            renderEmployees();
            showToast("Colaborador registrado exitosamente.", "success");
        }

        function takeVacationDays(employeeId) {
            const inputElement = document.getElementById(`vacation-input-${employeeId}`);
            const daysToTake = parseInt(inputElement.value);

            if (isNaN(daysToTake) || daysToTake <= 0) {
                showToast("Ingresa un número válido de días.", "error");
                return;
            }

            const empIndex = employees.findIndex(emp => emp.id === employeeId);
            if (empIndex === -1) return;

            const employee = employees[empIndex];
            const yearsOfService = calculateCompletedYears(employee.startDate);
            const totalEarned = calculateTotalEarnedDays(yearsOfService);
            const availableBalance = totalEarned - employee.daysTaken;

            if (daysToTake > availableBalance) {
                showToast(`Operación denegada. El colaborador solo tiene ${availableBalance} días disponibles.`, "error");
                return;
            }

            // Subtract days (by adding to taken)
            employees[empIndex].daysTaken += daysToTake;
            saveToStorage();
            renderEmployees();
            
            showToast(`Se registraron ${daysToTake} días de vacaciones tomados.`, "success");
        }

        function deleteEmployee(employeeId) {
            employees = employees.filter(emp => emp.id !== employeeId);
            saveToStorage();
            renderEmployees();
            showToast("Colaborador eliminado del sistema.", "success");
        }

        // --- 5. UI RENDERING ---

        function renderEmployees() {
            const container = document.getElementById('employeesList');
            const emptyState = document.getElementById('emptyState');
            const countBadge = document.getElementById('employeeCount');

            countBadge.textContent = `${employees.length} registrado${employees.length !== 1 ? 's' : ''}`;

            if (employees.length === 0) {
                container.innerHTML = '';
                emptyState.classList.remove('hidden');
                emptyState.classList.add('flex');
                return;
            }

            emptyState.classList.add('hidden');
            emptyState.classList.remove('flex');
            
            let html = '';

            employees.forEach(emp => {
                // Dynamic calculations (happens every render, automatically handles anniversaries!)
                const yearsOfService = calculateCompletedYears(emp.startDate);
                const totalEarned = calculateTotalEarnedDays(yearsOfService);
                const availableBalance = totalEarned - emp.daysTaken;
                const daysCurrentTier = getDaysForYear(yearsOfService + 1); // Days they will get next anniversary
                
                let balanceColorClass = availableBalance > 0 ? 'text-green-600' : 'text-slate-500';
                
                html += `
                <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden flex flex-col transition-all hover:shadow-md">
                    <!-- Card Header -->
                    <div class="bg-slate-50 px-5 py-4 border-b border-slate-200 flex justify-between items-start">
                        <div>
                            <h3 class="font-bold text-lg text-slate-800">${emp.name}</h3>
                            <p class="text-xs text-slate-500 mt-1 flex flex-col gap-0.5">
                                <span><strong>RFC:</strong> ${emp.rfc}</span>
                                <span><strong>CURP:</strong> ${emp.curp}</span>
                                <span><strong>NSS:</strong> ${emp.nss}</span>
                            </p>
                        </div>
                        <button onclick="deleteEmployee('${emp.id}')" class="text-slate-400 hover:text-red-500 transition-colors" title="Eliminar colaborador">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                                <path fill-rule="evenodd" d="M9 2a1 1 0 00-.894.553L7.382 4H4a1 1 0 000 2v10a2 2 0 002 2h8a2 2 0 002-2V6a1 1 0 100-2h-3.382l-.724-1.447A1 1 0 0011 2H9zM7 8a1 1 0 012 0v6a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v6a1 1 0 102 0V8a1 1 0 00-1-1z" clip-rule="evenodd" />
                            </svg>
                        </button>
                    </div>

                    <!-- Card Body -->
                    <div class="p-5 flex-grow">
                        <div class="grid grid-cols-2 gap-4 mb-4">
                            <div class="bg-blue-50/50 p-3 rounded-lg border border-blue-100">
                                <span class="block text-xs text-slate-500 mb-1">Fecha de Ingreso</span>
                                <span class="font-medium text-sm text-slate-800">${formatDate(emp.startDate)}</span>
                            </div>
                            <div class="bg-blue-50/50 p-3 rounded-lg border border-blue-100">
                                <span class="block text-xs text-slate-500 mb-1">Antigüedad</span>
                                <span class="font-medium text-sm text-slate-800">${yearsOfService} año(s)</span>
                            </div>
                        </div>

                        <div class="mb-5">
                            <h4 class="text-xs uppercase tracking-wider font-semibold text-slate-400 mb-3">Balance de Vacaciones</h4>
                            <div class="flex justify-between items-center mb-2">
                                <span class="text-sm text-slate-600">Total Ganadas (Histórico)</span>
                                <span class="font-medium text-sm">${totalEarned} días</span>
                            </div>
                            <div class="flex justify-between items-center mb-2">
                                <span class="text-sm text-slate-600">Días Tomados</span>
                                <span class="font-medium text-sm text-red-500">-${emp.daysTaken} días</span>
                            </div>
                            <div class="flex justify-between items-center pt-2 border-t border-slate-100 mt-2">
                                <span class="text-sm font-bold text-slate-800">Saldo Disponible</span>
                                <span class="text-xl font-bold ${balanceColorClass}">${availableBalance} <span class="text-sm font-medium">días</span></span>
                            </div>
                        </div>

                        ${yearsOfService === 0 ? 
                            `<div class="text-xs text-orange-600 bg-orange-50 p-2 rounded-md mb-4 flex items-start gap-1">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
                                </svg>
                                Aún no cumple el año. En su 1er aniversario se le sumarán automáticamente 12 días.
                            </div>` : ''
                        }
                    </div>

                    <!-- Card Footer (Action) -->
                    <div class="bg-slate-50 p-4 border-t border-slate-200">
                        <label class="block text-xs font-medium text-slate-600 mb-2">Registrar Vacaciones Tomadas</label>
                        <div class="flex gap-2">
                            <input type="number" id="vacation-input-${emp.id}" min="1" max="${availableBalance}" class="w-20 px-3 py-1.5 text-sm border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" placeholder="Días">
                            <button onclick="takeVacationDays('${emp.id}')" ${availableBalance === 0 ? 'disabled' : ''} class="flex-grow bg-slate-800 hover:bg-slate-900 disabled:bg-slate-300 disabled:cursor-not-allowed text-white text-sm font-medium py-1.5 px-3 rounded-lg transition-colors">
                                Descontar Días
                            </button>
                        </div>
                    </div>
                </div>
                `;
            });

            container.innerHTML = html;
        }

        // --- 6. TOAST NOTIFICATIONS ---
        let toastTimeout;
        function showToast(message, type = "success") {
            const toast = document.getElementById('toast');
            const toastMessage = document.getElementById('toastMessage');
            const iconContainer = document.getElementById('toastIconContainer');
            
            toastMessage.textContent = message;
            
            if (type === "success") {
                toast.className = "fixed bottom-5 right-5 transform transition-all duration-300 z-50 flex items-center p-4 mb-4 text-slate-500 bg-white rounded-lg shadow-xl border-l-4 border-green-500";
                iconContainer.className = "inline-flex items-center justify-center flex-shrink-0 w-8 h-8 text-green-500 bg-green-100 rounded-lg";
                iconContainer.innerHTML = `<svg class="w-5 h-5" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 20 20"><path d="M10 .5a9.5 9.5 0 1 0 9.5 9.5A9.51 9.51 0 0 0 10 .5Zm3.707 8.207-4 4a1 1 0 0 1-1.414 0l-2-2a1 1 0 0 1 1.414-1.414L9 10.586l3.293-3.293a1 1 0 0 1 1.414 1.414Z"/></svg>`;
            } else {
                toast.className = "fixed bottom-5 right-5 transform transition-all duration-300 z-50 flex items-center p-4 mb-4 text-slate-500 bg-white rounded-lg shadow-xl border-l-4 border-red-500";
                iconContainer.className = "inline-flex items-center justify-center flex-shrink-0 w-8 h-8 text-red-500 bg-red-100 rounded-lg";
                iconContainer.innerHTML = `<svg class="w-5 h-5" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 20 20"><path d="M10 .5a9.5 9.5 0 1 0 9.5 9.5A9.51 9.51 0 0 0 10 .5Zm3.5 11.6a1 1 0 0 1-1.4 1.4l-2.1-2.1-2.1 2.1a1 1 0 0 1-1.4-1.4L8.6 10 6.5 7.9a1 1 0 0 1 1.4-1.4l2.1 2.1 2.1-2.1a1 1 0 0 1 1.4 1.4L11.4 10l2.1 2.1Z"/></svg>`;
            }

            // Show
            toast.classList.remove('translate-y-20', 'opacity-0');
            
            // Hide after 3.5 seconds
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => {
                toast.classList.add('translate-y-20', 'opacity-0');
            }, 3500);
        }

        // Initialize App on load
        window.addEventListener('DOMContentLoaded', initApp);
    </script>
</body>
</html>
